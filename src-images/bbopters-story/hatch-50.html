<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 400px;
      background: linear-gradient(135deg, #FFF9F0 0%, #FFF3E0 100%);
      font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
      display: flex;
      padding: 40px 60px;
      gap: 40px;
    }
    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .badge {
      display: inline-flex;
      background: #92400e;
      color: #fef3c7;
      padding: 6px 14px;
      border-radius: 50px;
      font-size: 13px;
      font-weight: 700;
      width: fit-content;
      margin-bottom: 16px;
    }
    .big-text {
      font-size: 56px;
      font-weight: 900;
      color: #92400e;
      line-height: 1.15;
      margin-bottom: 12px;
    }
    .sub-text {
      font-size: 16px;
      color: #a16207;
      line-height: 1.6;
    }
    .right {
      width: 440px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      justify-content: center;
    }
    .quote-card {
      background: white;
      border-radius: 14px;
      padding: 20px 24px;
      border: 1px solid #fde68a;
      box-shadow: 0 2px 8px rgba(146, 64, 14, 0.06);
    }
    .quote-text {
      font-size: 16px;
      font-weight: 700;
      color: #92400e;
      line-height: 1.5;
    }
    .quote-author {
      font-size: 12px;
      color: #a16207;
      margin-top: 6px;
    }
    .eggs {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .egg {
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="left">
    <div class="badge">🐣 오프라인 설치세션</div>
    <div class="big-text">50마리<br>부화</div>
    <div class="sub-text">주말 밤 11시 반까지<br>한 명 한 명 같이 설치하고, 이름 짓고, 성격 만들고</div>
  </div>
  <div class="right">
    <div class="quote-card">
      <div class="quote-text">"50마리 부화시켰습니다 ㅋㅋㅋ<br>뽀짝이 친구들 생김!!!!!!!!"</div>
      <div class="quote-author">— 닿(집사), Slack #칭찬 채널</div>
    </div>
    <div class="quote-card">
      <div class="eggs">🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣🐣</div>
    </div>
  </div>
</body>
</html>
